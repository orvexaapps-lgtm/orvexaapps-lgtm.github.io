<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orvexa Ecosystem</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0b0d12;
color:white;
overflow-x:hidden;
}

/* TOP BAR */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
padding:16px 22px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:10;
}

nav a{
color:#aaa;
margin-left:14px;
text-decoration:none;
font-size:13px;
}
nav a:hover{color:#00d5ff;}

/* HERO */
.hero{
text-align:center;
padding:70px 20px 20px;
}

.hero h1{
font-size:46px;
margin:0;
letter-spacing:-1px;
}

.hero p{
color:#888;
max-width:900px;
margin:10px auto;
line-height:1.7;
}

/* GRID */
.grid{
max-width:1200px;
margin:auto;
padding:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:18px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:18px;
cursor:pointer;
transition:0.35s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-8px);
border-color:#00d5ff;
box-shadow:0 10px 40px rgba(0,213,255,0.08);
}

.icon{
width:58px;
height:58px;
border-radius:14px;
overflow:hidden;
background:#111;
}

.icon img{width:100%;height:100%;}

.title{margin-top:12px;font-weight:600;font-size:16px;}
.sub{color:#00d5ff;font-size:12px;margin-top:2px;}
.meta{color:#777;font-size:11px;margin-top:6px;}

/* MODAL FULL DETAIL VIEW */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
backdrop-filter:blur(10px);
}

.box{
width:600px;
max-height:85vh;
overflow:auto;
background:#111;
border-radius:16px;
padding:22px;
border:1px solid rgba(255,255,255,0.1);
animation:pop 0.25s ease;
}

@keyframes pop{
from{transform:scale(0.9);opacity:0}
to{transform:scale(1);opacity:1}
}

/* DETAIL SECTIONS */
.section-title{
color:#00d5ff;
font-size:12px;
margin-top:14px;
}

p{
color:#bbb;
font-size:13px;
line-height:1.6;
}

.feature-list{
margin-top:6px;
color:#aaa;
font-size:12px;
line-height:1.6;
}

button{
width:100%;
margin-top:16px;
padding:12px;
border:none;
border-radius:10px;
background:#00d5ff;
color:black;
font-weight:600;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
color:#666;
font-size:12px;
}

</style>
</head>

<body>

<header>
<div>Orvexa Ecosystem</div>
<nav>
<a href="#apps">Apps</a>
<a href="#privacy">Privacy</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Orvexa Application Ecosystem</h1>
<p>Official developer portal for Amazon Appstore applications built for Android, Fire TV, and tablet ecosystems.</p>
</section>

<section class="grid" id="apps"></section>

<!-- DETAIL MODAL -->
<div class="modal" id="modal">
<div class="box">

<h2 id="name"></h2>
<div style="color:#00d5ff;font-size:13px" id="subtitle"></div>

<div class="section-title">Overview</div>
<p id="desc"></p>

<div class="section-title">Features</div>
<div class="feature-list" id="features"></div>

<div class="section-title">App Info</div>
<p style="color:#777;font-size:12px">
ASIN: <span id="asin"></span>
</p>

<button id="openBtn">Open Amazon Store</button>

</div>
</div>

<footer id="privacy">
Orvexa Ecosystem © 2026 • Privacy-focused application platform
</footer>

<script>

const apps = [
{
name:"Orvexa Files",
subtitle:"Advanced File Manager",
asin:"B0F6D8GJTP",
icon:"icons/files.png",
desc:"Fast and easy file manager with offline support.",
features:[
"Fast file browsing",
"File create / rename / delete",
"Built-in audio player",
"Multiple format support",
"Offline operation"
],
store:"https://www.amazon.com/gp/product/B0F6D8GJTP"
},
{
name:"Orvexa Media Player",
subtitle:"Local Media Engine",
asin:"B0DRNNVN1H",
icon:"icons/media.png",
desc:"Smooth playback engine for Android and Fire TV devices.",
features:[
"Play music & video files",
"Fire TV optimized",
"Multiple format support",
"Clean UI design",
"Offline playback"
],
store:"https://www.amazon.com/gp/product/B0DRNNVN1H"
},
{
name:"Orvexa Files Pro",
subtitle:"Premium File System",
asin:"B0GX37331H",
icon:"icons/filespro.png",
desc:"Advanced ad-free file manager with professional tools.",
features:[
"No ads premium version",
"Copy / move / rename",
"PDF viewer",
"ZIP support",
"APK installer",
"TV optimized"
],
store:"https://www.amazon.com/gp/product/B0GX37331H"
},
{
name:"Playlist Player",
subtitle:"Smart Media Playlists",
asin:"B0CWS28SXJ",
icon:"icons/playlist.png",
desc:"Local playlist-based media playback system.",
features:[
"Playlist creation",
"Fast navigation",
"Local media support",
"TV remote optimized"
],
store:"https://www.amazon.com/gp/product/B0CWS28SXJ"
},
{
name:"Orvexa Radio",
subtitle:"Global Radio Stream",
asin:"B0GTS87KSZ",
icon:"icons/radio.png",
desc:"Stream global radio stations from around the world.",
features:[
"Thousands of stations",
"Favorites system",
"Background playback",
"Search by region",
"Fire TV optimized"
],
store:"https://www.amazon.com/gp/product/B0GTS87KSZ"
}
];

const grid=document.getElementById("apps");
const modal=document.getElementById("modal");

apps.forEach(a=>{
let c=document.createElement("div");
c.className="card";

c.innerHTML=`
<div class="icon"><img src="${a.icon}"></div>
<div class="title">${a.name}</div>
<div class="sub">${a.subtitle}</div>
<div class="meta">${a.asin}</div>
`;

c.onclick=()=>{
document.getElementById("name").innerText=a.name;
document.getElementById("subtitle").innerText=a.subtitle;
document.getElementById("desc").innerText=a.desc;
document.getElementById("asin").innerText=a.asin;

document.getElementById("features").innerHTML =
a.features.map(f=>"• "+f).join("<br>");

document.getElementById("openBtn").onclick=()=>{
window.open(a.store,"_blank");
};

modal.style.display="flex";
};

grid.appendChild(c);
});

modal.onclick=()=>modal.style.display="none";

</script>

</body>
</html>
