<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orvexa Ecosystem</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#0a0c10;
color:white;
overflow-x:hidden;
}

/* TOP BAR */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:14px 22px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(22px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:100;
}

header div{font-weight:600;}

nav a{
color:#aaa;
margin-left:16px;
text-decoration:none;
font-size:13px;
}
nav a:hover{color:#00d5ff;}

/* HERO PARALLAX */
.hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
padding:0 20px;
background:
radial-gradient(circle at 20% 20%,rgba(0,200,255,0.2),transparent 40%),
radial-gradient(circle at 80% 80%,rgba(0,255,170,0.15),transparent 40%);
}

.hero h1{
font-size:54px;
margin:0;
letter-spacing:-1px;
transform:translateY(20px);
opacity:0;
animation:fadeUp 1s ease forwards;
}

.hero p{
max-width:850px;
color:#888;
line-height:1.7;
margin-top:15px;
opacity:0;
animation:fadeUp 1s ease 0.2s forwards;
}

@keyframes fadeUp{
to{transform:translateY(0);opacity:1;}
}

/* SECTION */
.section{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

/* APP GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
border-radius:18px;
padding:18px;
cursor:pointer;
transition:0.4s;
transform:translateY(30px);
opacity:0;
}

.card.show{
transform:translateY(0);
opacity:1;
}

.card:hover{
transform:translateY(-10px);
border-color:#00d5ff;
box-shadow:0 15px 50px rgba(0,200,255,0.08);
}

.icon{
width:60px;
height:60px;
border-radius:14px;
overflow:hidden;
background:#111;
}

.icon img{width:100%;height:100%;}

.title{margin-top:10px;font-weight:600;}
.sub{color:#00d5ff;font-size:12px;}
.meta{color:#777;font-size:11px;margin-top:5px;}

/* DETAIL PANEL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
justify-content:center;
align-items:center;
}

.box{
width:620px;
max-height:85vh;
overflow:auto;
background:#111;
border-radius:18px;
padding:24px;
border:1px solid rgba(255,255,255,0.1);
animation:pop 0.25s ease;
}

@keyframes pop{
from{transform:scale(0.95);opacity:0}
to{transform:scale(1);opacity:1}
}

.section-title{
color:#00d5ff;
font-size:12px;
margin-top:14px;
}

p{color:#bbb;font-size:13px;line-height:1.6;}

.feature{
color:#aaa;
font-size:12px;
line-height:1.6;
}

button{
width:100%;
margin-top:16px;
padding:12px;
border:none;
border-radius:10px;
background:#00d5ff;
color:black;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div>Orvexa Ecosystem</div>
<nav>
<a href="#apps">Apps</a>
<a href="#privacy">Privacy</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Orvexa Ecosystem Platform</h1>
<p>Enterprise application suite for Amazon Appstore, Fire TV, and Android devices with unified ecosystem architecture.</p>
</section>

<section class="section" id="apps">
<div class="grid" id="grid"></div>
</section>

<!-- DETAIL -->
<div class="modal" id="modal">
<div class="box">
<h2 id="name"></h2>
<div style="color:#00d5ff" id="sub"></div>

<div class="section-title">Overview</div>
<p id="desc"></p>

<div class="section-title">Features</div>
<div id="features"></div>

<p style="color:#777;font-size:11px;margin-top:10px">
ASIN: <span id="asin"></span>
</p>

<button id="open">Open Amazon Store</button>
</div>
</div>

<script>

const apps=[
{
name:"Orvexa Files",
sub:"File System Core",
asin:"B0F6D8GJTP",
icon:"icons/files.png",
desc:"Fast offline file manager for Android and Fire TV.",
features:["File manager","Offline support","Audio player","Fast browsing"],
url:"https://www.amazon.com/gp/product/B0F6D8GJTP"
},
{
name:"Orvexa Media Player",
sub:"Media Engine",
asin:"B0DRNNVN1H",
icon:"icons/media.png",
desc:"Optimized playback engine for local media.",
features:["Video playback","Fire TV optimized","No accounts","Smooth UI"],
url:"https://www.amazon.com/gp/product/B0DRNNVN1H"
},
{
name:"Orvexa Files Pro",
sub:"Premium System",
asin:"B0GX37331H",
icon:"icons/filespro.png",
desc:"Advanced file management suite.",
features:["No ads","ZIP support","PDF viewer","APK install"],
url:"https://www.amazon.com/gp/product/B0GX37331H"
},
{
name:"Playlist Player",
sub:"Playlist Engine",
asin:"B0CWS28SXJ",
icon:"icons/playlist.png",
desc:"Local playlist-based media system.",
features:["Playlist support","Fast UI","Offline playback"],
url:"https://www.amazon.com/gp/product/B0CWS28SXJ"
},
{
name:"Orvexa Radio",
sub:"Streaming System",
asin:"B0GTS87KSZ",
icon:"icons/radio.png",
desc:"Global radio streaming platform.",
features:["Thousands of stations","Favorites","Background play"],
url:"https://www.amazon.com/gp/product/B0GTS87KSZ"
}
];

const grid=document.getElementById("grid");
const modal=document.getElementById("modal");

apps.forEach((a,i)=>{
let c=document.createElement("div");
c.className="card";

c.innerHTML=`
<div class="icon"><img src="${a.icon}"></div>
<div class="title">${a.name}</div>
<div class="sub">${a.sub}</div>
<div class="meta">${a.asin}</div>
`;

setTimeout(()=>c.classList.add("show"),i*120);

c.onclick=()=>{
document.getElementById("name").innerText=a.name;
document.getElementById("sub").innerText=a.sub;
document.getElementById("desc").innerText=a.desc;
document.getElementById("asin").innerText=a.asin;

document.getElementById("features").innerHTML =
a.features.map(f=>"• "+f).join("<br>");

document.getElementById("open").onclick=()=>{
window.open(a.url,"_blank");
};

modal.style.display="flex";
};

grid.appendChild(c);
});

modal.onclick=()=>modal.style.display="none";

</script>

</body>
</html>
