<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orvexa Apps Portal</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background: radial-gradient(circle at top, #0b1220, #07090d);
color:#fff;
}

/* HEADER */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
padding:16px 22px;
background:rgba(10,12,18,0.75);
backdrop-filter:blur(22px);
border-bottom:1px solid rgba(255,255,255,0.08);
}

/* HERO */
.hero{
text-align:center;
padding:90px 20px;
}

.hero h1{
font-size:44px;
background:linear-gradient(90deg,#00d5ff,#7c5cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
color:#8a8f98;
max-width:820px;
margin:auto;
line-height:1.7;
}

/* GRID */
.section{
max-width:1100px;
margin:auto;
padding:70px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:18px;
}

/* CARD */
.card{
background:linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
border:1px solid rgba(255,255,255,0.08);
padding:18px;
border-radius:16px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#00d5ff;
}

/* BADGES */
.badge{
display:inline-block;
font-size:11px;
padding:4px 8px;
border-radius:6px;
margin-top:6px;
margin-right:4px;
background:rgba(0,213,255,0.15);
color:#00d5ff;
}

/* MODAL */
.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(12px);
justify-content:center;
align-items:center;
}

.box{
width:680px;
max-height:85vh;
overflow:auto;
background:#111;
border-radius:16px;
padding:22px;
border:1px solid rgba(255,255,255,0.08);
}

.top{
border-bottom:1px solid rgba(255,255,255,0.08);
padding-bottom:12px;
margin-bottom:12px;
}

.meta{
color:#888;
font-size:12px;
margin-top:6px;
}

ul{
color:#aaa;
font-size:13px;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:12px;
padding:10px 14px;
background:linear-gradient(90deg,#00d5ff,#7c5cff);
color:#000;
text-decoration:none;
border-radius:10px;
font-weight:bold;
font-size:13px;
}

</style>
</head>

<body>

<header>
<div><b>Orvexa Apps</b></div>
</header>

<section class="hero">
<h1>Orvexa Apps Portal</h1>
<p>Official developer ecosystem for Android and Fire TV applications.</p>
</section>

<section class="section">

<div class="grid">

<div class="card" onclick="openApp(0)">
<h3>Orvexa Files</h3>
<div class="badge">Android</div>
<div class="badge">Free</div>
<div class="badge">File Manager</div>
</div>

<div class="card" onclick="openApp(1)">
<h3>Media Player</h3>
<div class="badge">Fire TV</div>
<div class="badge">Free</div>
</div>

<div class="card" onclick="openApp(2)">
<h3>Files Pro</h3>
<div class="badge">Android</div>
<div class="badge">Premium</div>
</div>

<div class="card" onclick="openApp(3)">
<h3>Playlist Player</h3>
<div class="badge">Fire TV</div>
<div class="badge">Free</div>
</div>

<div class="card" onclick="openApp(4)">
<h3>Radio</h3>
<div class="badge">Global</div>
<div class="badge">Free</div>
</div>

</div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">

<div class="top">
<h2 id="title"></h2>
<div class="meta" id="meta"></div>
</div>

<p id="desc"></p>

<h4>Features</h4>
<ul id="features"></ul>

<a id="link" class="btn" target="_blank">Open in Amazon</a>

</div>
</div>

<script>

const apps=[
{
name:"Orvexa Files",
meta:"Android • File Manager • v1.0",
desc:"Fast and lightweight file manager.",
features:["Fast browsing","Offline support","File operations"],
link:"https://www.amazon.com/gp/product/B0F6D8GJTP"
},
{
name:"Media Player",
meta:"Fire TV • Media • v1.0",
desc:"Local playback system.",
features:["Video playback","Audio support","TV optimized"],
link:"https://www.amazon.com/gp/product/B0DRNNVN1H"
},
{
name:"Files Pro",
meta:"Android • Premium • v1.0",
desc:"Premium file manager with advanced tools.",
features:["ZIP support","PDF viewer","No ads"],
link:"https://www.amazon.com/gp/product/B0GX37331H"
},
{
name:"Playlist Player",
meta:"Fire TV • Media • v1.0",
desc:"Playlist management system.",
features:["Playlist creation","Fast UI","TV support"],
link:"https://www.amazon.com/gp/product/B0CWS28SXJ"
},
{
name:"Radio",
meta:"Global • Streaming • v1.0",
desc:"Worldwide radio streaming app.",
features:["Stations","Favorites","Background play"],
link:"https://www.amazon.com/gp/product/B0GTS87KSZ"
}
];

function openApp(i){
let a=apps[i];

document.getElementById("title").innerText=a.name;
document.getElementById("meta").innerText=a.meta;
document.getElementById("desc").innerText=a.desc;

let f="";
a.features.forEach(x=>f+="<li>"+x+"</li>");
document.getElementById("features").innerHTML=f;

document.getElementById("link").href=a.link;

document.getElementById("modal").style.display="flex";
}

document.getElementById("modal").onclick=function(){
this.style.display="none";
};

</script>

</body>
</html>
