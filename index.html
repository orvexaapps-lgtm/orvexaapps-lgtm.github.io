<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orvexa SaaS Console</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
  background:#0b0d12;
  color:white;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.title{
  font-weight:600;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:16px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#00d5ff;
}

.icon{
  width:50px;
  height:50px;
  border-radius:12px;
  overflow:hidden;
}

.icon img{width:100%;height:100%;}

.name{margin-top:10px;font-weight:600;}
.meta{color:#00d5ff;font-size:12px;}
.desc{color:#888;font-size:12px;margin-top:6px;}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  width:380px;
  background:#111;
  padding:20px;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="title">Orvexa SaaS Console</div>
  <div>Developer Dashboard</div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="n"></h3>
    <p id="d"></p>
    <button id="btn" style="padding:10px;background:#00d5ff;border:none;width:100%;border-radius:10px;">
      Open Store
    </button>
  </div>
</div>

<script>
fetch("apps.json")
.then(r=>r.json())
.then(data=>{
  const grid=document.getElementById("grid");

  data.apps.forEach(app=>{
    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="icon"><img src="${app.icon}"></div>
      <div class="name">${app.name}</div>
      <div class="meta">${app.asin}</div>
      <div class="desc">${app.desc}</div>
    `;

    div.onclick=()=>{
      document.getElementById("modal").style.display="flex";
      document.getElementById("n").innerText=app.name;
      document.getElementById("d").innerText=app.desc;

      document.getElementById("btn").onclick=()=>{
        window.open(app.store,"_blank");
      };
    };

    grid.appendChild(div);
  });
});

document.getElementById("modal").onclick=()=> {
  document.getElementById("modal").style.display="none";
};
</script>

</body>
</html>
